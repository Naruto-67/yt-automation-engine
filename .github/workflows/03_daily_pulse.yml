name: 03_Ghost_Daily_Pulse
on:
  schedule:
    - cron: '30 17 * * *'
  workflow_dispatch:

concurrency:
  group: ghost-engine-lock
  cancel-in-progress: false

jobs:
  channel_health_pulse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'   # 🔄 PATCH: Dynamic Python version
      - run: pip install -r requirements.txt
      - env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m scripts.performance_analyst
      - run: |
          git config --global user.name "Ghost-Engine-Bot"
          git config --global user.email "bot@ghostengine.ai"
          git add assets/lessons_learned.json memory/*.json
          if ! git diff --staged --quiet; then
            git commit -m "Update AI Brain Strategy [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
