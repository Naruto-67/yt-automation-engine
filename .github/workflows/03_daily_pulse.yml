name: 03_Ghost_Daily_Pulse

on:
  schedule:
    - cron: '30 17 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if kill switch is active'
        type: boolean
        default: false

concurrency:
  group: ghost-engine-lock
  cancel-in-progress: false

jobs:
  channel_health_pulse:
    runs-on: ubuntu-latest
    if: vars.GHOST_ENGINE_ENABLED != 'false' || github.event.inputs.force_run == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib \
                      google-genai requests pydantic pyyaml pytz

      - name: Run Analyst
        env:
          GHOST_ENGINE_ENABLED: ${{ vars.GHOST_ENGINE_ENABLED }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}

          YOUTUBE_CLIENT_ID_MAIN:       ${{ secrets.YOUTUBE_CLIENT_ID_MAIN }}
          YOUTUBE_CLIENT_SECRET_MAIN:   ${{ secrets.YOUTUBE_CLIENT_SECRET_MAIN }}
          YOUTUBE_REFRESH_TOKEN_MAIN:   ${{ secrets.YOUTUBE_REFRESH_TOKEN_MAIN }}
          DISCORD_WEBHOOK_MAIN:         ${{ secrets.DISCORD_WEBHOOK_MAIN }}

          # YOUTUBE_CLIENT_ID_TECH:     ${{ secrets.YOUTUBE_CLIENT_ID_TECH }}
          # YOUTUBE_CLIENT_SECRET_TECH: ${{ secrets.YOUTUBE_CLIENT_SECRET_TECH }}
          # YOUTUBE_REFRESH_TOKEN_TECH: ${{ secrets.YOUTUBE_REFRESH_TOKEN_TECH }}
          # DISCORD_WEBHOOK_TECH:       ${{ secrets.DISCORD_WEBHOOK_TECH }}
        run: python -m scripts.performance_analyst

      - name: Commit State
        run: |
          git config --global user.name  "Ghost-Engine-Bot"
          git config --global user.email "bot@ghostengine.ai"
          git add memory/ghost_engine.db memory/quota_state.json || true
          if ! git diff --staged --quiet; then
            git commit -m "Pulse: Update strategy & quota state [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
