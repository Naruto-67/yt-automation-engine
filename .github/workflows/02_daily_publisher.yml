name: 02_Ghost_Daily_Publisher

on:
  schedule:
    - cron: '0 12 * * *' # 12:00 UTC = 5:30 PM IST
  workflow_dispatch:

jobs:
  publish_videos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install google-api-python-client google-auth-oauthlib google-auth-httplib2 pytz requests

      - name: Execute Dual-Release Publisher
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/schedule_video.py

      - name: Sync and Commit
        run: |
          git config --global user.name "Ghost-Engine-Bot"
          git config --global user.email "bot@ghostengine.ai"
          git add memory/api_state.json
          git pull --rebase origin main
          git commit -m "Update Publisher Quota [skip ci]" || echo "No changes to commit"
          git push origin main
