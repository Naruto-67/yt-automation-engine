name: Daily YouTube Publisher

# Runs automatically every day at 12:00 PM UTC (which is 5:30 PM IST)
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows you to click "Run workflow" manually to test it

jobs:
  publish-video:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python packages
        run: pip install google-api-python-client google-auth-oauthlib google-auth-httplib2 requests pytz

      - name: Run Vault Publisher
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        # CRITICAL FIX: Running as a module so imports work correctly
        run: python -m scripts.schedule_video
