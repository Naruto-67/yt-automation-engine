name: 11_Weekly_Audit

on:
  schedule:
    - cron: '0 21 * * 0'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests google-genai google-auth-httplib2 google-auth-oauthlib \
                      google-api-python-client pyyaml pytz pydantic

      - name: Run Token Health Check
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_MAIN: ${{ secrets.DISCORD_WEBHOOK_MAIN }}

          YOUTUBE_CLIENT_ID_MAIN:       ${{ secrets.YOUTUBE_CLIENT_ID_MAIN }}
          YOUTUBE_CLIENT_SECRET_MAIN:   ${{ secrets.YOUTUBE_CLIENT_SECRET_MAIN }}
          YOUTUBE_REFRESH_TOKEN_MAIN:   ${{ secrets.YOUTUBE_REFRESH_TOKEN_MAIN }}

        run: python scripts/token_health.py

      - name: Run Storage Housekeeping
        env:
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_MAIN: ${{ secrets.DISCORD_WEBHOOK_MAIN }}
        run: python -m engine.storage_manager

      - name: Run API Stack Audit
        env:
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_MAIN: ${{ secrets.DISCORD_WEBHOOK_MAIN }}
        run: python scripts/api_monitor.py

      - name: Commit State & Memory
        run: |
          git config --global user.name  "Ghost-Engine-Bot"
          git config --global user.email "bot@ghostengine.ai"
          git add memory/ghost_engine.db memory/quota_state.json memory/replied_comments_*.json memory/token_health.json config/channels.yaml assets/lessons_learned.json || true
          
          if ! git diff --staged --quiet; then
            git commit -m "Auto-state update: Pipeline synchronization [skip ci]"
            
            for i in {1..5}; do
              git push && break || {
                echo "└ ⚠️ Git push conflict detected. Rebasing (Attempt $i/5)..."
                git pull --rebase origin main
                sleep $(( i * 5 ))
              }
            done
          fi
