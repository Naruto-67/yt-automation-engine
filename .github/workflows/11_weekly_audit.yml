# .github/workflows/11_weekly_audit.yml
name: 11_Weekly_Audit

on:
  schedule:
    - cron: '0 21 * * 0'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests google-genai google-auth-httplib2 google-auth-oauthlib \
                      google-api-python-client pyyaml pytz pydantic

      - name: Install FFmpeg
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq ffmpeg
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Run Token Health Check
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}

          YOUTUBE_CLIENT_ID_CH1:       ${{ secrets.YOUTUBE_CLIENT_ID_CH1 }}
          YOUTUBE_CLIENT_SECRET_CH1:   ${{ secrets.YOUTUBE_CLIENT_SECRET_CH1 }}
          YOUTUBE_REFRESH_TOKEN_CH1:   ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH1 }}
          DISCORD_WEBHOOK_CH1:         ${{ secrets.DISCORD_WEBHOOK_CH1 }}

          YOUTUBE_CLIENT_ID_CH2:       ${{ secrets.YOUTUBE_CLIENT_ID_CH2 }}
          YOUTUBE_CLIENT_SECRET_CH2:   ${{ secrets.YOUTUBE_CLIENT_SECRET_CH2 }}
          YOUTUBE_REFRESH_TOKEN_CH2:   ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH2 }}
          DISCORD_WEBHOOK_CH2:         ${{ secrets.DISCORD_WEBHOOK_CH2 }}

        run: python -m scripts.token_health

      - name: Run Storage Housekeeping
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK_CH1: ${{ secrets.DISCORD_WEBHOOK_CH1 }}
          DISCORD_WEBHOOK_CH2: ${{ secrets.DISCORD_WEBHOOK_CH2 }}
        run: python -m engine.storage_manager

      - name: Run API Stack Audit
        env:
          GEMINI_API_KEY:  ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK_CH1: ${{ secrets.DISCORD_WEBHOOK_CH1 }}
          DISCORD_WEBHOOK_CH2: ${{ secrets.DISCORD_WEBHOOK_CH2 }}
        run: python -m scripts.api_monitor

      - name: Seed Music Library
        # DISABLED: Pixabay type=music is not a real API parameter — it returns
        # photos silently. FFmpeg rejects JPEG input when trying to create MP3.
        # Pixabay has no music API endpoint. Freesound.org integration pending.
        # Background music in render_video.py is already optional — videos
        # produce correctly with empty music folders. No action needed here.
        run: |
          mkdir -p assets/music
          echo "✅ Music seeding disabled — Pixabay has no music API."
          echo "   Videos render normally without background music."
          echo "   To enable: register at freesound.org/apiv2/apply/ and"
          echo "   add FREESOUND_API_KEY secret, then update music_manager.py."

      - name: Commit State & Memory
        run: |
          git config --global user.name  "Ghost-Engine-Bot"
          git config --global user.email "bot@ghostengine.ai"
          
          git add memory/ghost_engine.db || true
          git add memory/quota_state.json || true
          git add memory/replied_comments_*.json 2>/dev/null || true
          git add memory/token_health.json || true
          git add config/channels.yaml || true
          git add assets/lessons_learned.json 2>/dev/null || true
          git add assets/music/ || true

          if ! git diff --staged --quiet; then
            git commit -m "Weekly audit: State sync [skip ci]"
            
            for i in {1..5}; do
              git push && break || {
                echo "└ ⚠️ Git push conflict detected. Rebasing (Attempt $i/5)..."
                git pull --rebase -X theirs origin main
                sleep $(( i * 5 ))
              }
            done
          fi
