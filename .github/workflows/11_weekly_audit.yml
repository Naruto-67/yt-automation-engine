name: 11_Weekly_Audit

# ── Runs at 21:00 UTC Sunday (after 05_weekly_research at 20:00) ─────────────
on:
  schedule:
    - cron: '0 21 * * 0'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install requests google-genai google-auth-httplib2 google-auth-oauthlib \
                      google-api-python-client pyyaml pytz pydantic

      - name: Run Token Health Check
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_MAIN: ${{ secrets.DISCORD_WEBHOOK_MAIN }}

          YOUTUBE_CLIENT_ID_MAIN:       ${{ secrets.YOUTUBE_CLIENT_ID_MAIN }}
          YOUTUBE_CLIENT_SECRET_MAIN:   ${{ secrets.YOUTUBE_CLIENT_SECRET_MAIN }}
          YOUTUBE_REFRESH_TOKEN_MAIN:   ${{ secrets.YOUTUBE_REFRESH_TOKEN_MAIN }}

          # YOUTUBE_CLIENT_ID_TECH:     ${{ secrets.YOUTUBE_CLIENT_ID_TECH }}
          # YOUTUBE_CLIENT_SECRET_TECH: ${{ secrets.YOUTUBE_CLIENT_SECRET_TECH }}
          # YOUTUBE_REFRESH_TOKEN_TECH: ${{ secrets.YOUTUBE_REFRESH_TOKEN_TECH }}
          # DISCORD_WEBHOOK_TECH:       ${{ secrets.DISCORD_WEBHOOK_TECH }}
        run: python scripts/token_health.py

      - name: Run Storage Housekeeping
        env:
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_MAIN: ${{ secrets.DISCORD_WEBHOOK_MAIN }}
        run: python -m engine.storage_manager

      - name: Run API Stack Audit
        env:
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_MAIN: ${{ secrets.DISCORD_WEBHOOK_MAIN }}
        run: python scripts/api_monitor.py

      - name: Commit Audit Results
        run: |
          git config --global user.name  "Ghost-Engine-Bot"
          git config --global user.email "bot@ghostengine.ai"
          git add memory/token_health.json memory/ghost_engine.db || true
          if ! git diff --staged --quiet; then
            git commit -m "Audit: Token health & storage housekeeping [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
