# .github/workflows/11_weekly_audit.yml
# ═══════════════════════════════════════════════════════════════════════════════
# FIX #1 — Token health check wired into the weekly audit workflow
#
# ADDED: "Run Token Health Check" step before the existing api_monitor.py step.
# It runs scripts/token_health.py which makes real live OAuth calls for every
# active channel and fires tiered Discord alerts (HEALTHY/WARNING/CRITICAL/DEAD).
# Results are committed to memory/token_health.json so the day-counter persists.
#
# WHY A SEPARATE STEP (not merged into api_monitor.py):
#   api_monitor.py uses Gemini to scan provider changelogs — it can fail if
#   Gemini quota is exhausted. token_health.py only needs `requests` + `pyyaml`
#   and makes direct HTTP calls. Keeping them separate ensures token health
#   runs even when Gemini is down.
#
# NEW SECRETS NEEDED: None — uses the same YOUTUBE_CLIENT_ID,
#   YOUTUBE_CLIENT_SECRET, and YOUTUBE_REFRESH_TOKEN* secrets as the engine.
#   Add one YOUTUBE_REFRESH_TOKEN_* entry per channel matching channels.yaml.
# ═══════════════════════════════════════════════════════════════════════════════

name: "11_Weekly_API_Audit"

on:
  schedule:
    - cron: "0 20 * * 0"  # 20:00 UTC every Sunday
  workflow_dispatch:        # Manual trigger available at any time

concurrency:
  group: ghost-engine-lock
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to commit memory/token_health.json

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for clean push back

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # token_health.py needs: requests, pyyaml
      # api_monitor.py needs:  requests, google-genai, pyyaml, pytz, pydantic
      # Installing the superset covers both.
      - name: Install Dependencies
        run: pip install requests google-genai pyyaml pytz pydantic

      # ── FIX #1: Token Health Check ────────────────────────────────────────
      # Tests live YouTube OAuth for every active channel in channels.yaml.
      # Fires tiered Discord alerts and writes to memory/token_health.json.
      - name: Run Token Health Check
        env:
          YOUTUBE_CLIENT_ID:          ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:      ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          # Add one line per channel — name must match youtube_refresh_token_env
          # in config/channels.yaml exactly.
          YOUTUBE_REFRESH_TOKEN:      ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_REFRESH_TOKEN_TECH: ${{ secrets.YOUTUBE_REFRESH_TOKEN_TECH }}
          DISCORD_WEBHOOK_URL:        ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/token_health.py

      # Commit the updated health tracking file so the day-counter persists
      # across weekly runs (GitHub Actions runners are ephemeral).
      - name: Commit Token Health Data
        run: |
          git config user.name  "Ghost Engine Bot"
          git config user.email "ghost-engine@noreply.github.com"
          git add memory/token_health.json
          if git diff --staged --quiet; then
            echo "ℹ️ No changes to token_health.json — skipping commit."
          else
            git commit -m "chore: update token_health.json [$(date -u +'%Y-%m-%d')]"
            git push origin main
          fi
      # ──────────────────────────────────────────────────────────────────────

      # Original API deprecation audit — unchanged, runs after token check
      - name: Run API Deprecation Audit
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scripts/api_monitor.py
