name: Daily YouTube Shorts Pipeline

on:
  workflow_dispatch:

jobs:
  build-and-render:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies (FFmpeg & Kokoro Voice Engine)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-liberation espeak-ng

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ⚡ THE NEW AI CACHE VAULT ⚡
      # This saves the massive gigabytes of AI models so they don't download every run
      - name: Cache AI Models (Whisper & Kokoro)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: ${{ runner.os }}-ai-models-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-ai-models-

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Run Master Orchestrator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python main.py

      - name: Upload Final Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: finished-youtube-short
          path: ${{ env.FINAL_VIDEO_NAME }}
