name: Test Master Video Assembly

on:
  workflow_dispatch:

jobs:
  render-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Fix ImageMagick Security Policy for Subtitles
        run: |
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml

      - name: Install dependencies
        run: pip install edge-tts requests moviepy Pillow

      - name: 1. Generate Voiceover & VTT
        run: python src/generators/audio_generator.py

      - name: 2. Download Background Video
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python src/generators/video_fetcher.py

      - name: 3. Assemble Final Video with Subtitles
        run: python src/assembly/video_editor.py

      - name: 4. Upload Final Masterpiece
        uses: actions/upload-artifact@v4
        with:
          name: finished-youtube-short
          path: master_final_video.mp4
