name: Test Master Video Assembly

on:
  workflow_dispatch:

jobs:
  render-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-liberation

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: 1. Generate Voice & Basic Subtitles
        run: python src/generators/audio_generator.py

      - name: 2. Download Background Video
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python src/generators/video_fetcher.py

      - name: 3. Assemble with Captions
        run: python src/assembly/video_editor.py

      - name: 4. Extract frame to verify captions
        run: ffmpeg -i master_final_video.mp4 -ss 2 -frames:v 1 frame_check.png

      - name: 5. Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: finished-youtube-short
          path: |
            master_final_video.mp4
            frame_check.png
