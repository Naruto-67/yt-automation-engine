name: Test Master Video Assembly

on:
  workflow_dispatch:

jobs:
  render-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Fix ImageMagick Security Policy
        run: |
          sudo sed -i 's/none/read,write/g' /etc/ImageMagick-6/policy.xml

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 1. Generate Voice & JSON
        run: python src/generators/audio_generator.py

      - name: 2. Download Video
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python src/generators/video_fetcher.py

      - name: 3. Assemble Master Video
        run: python src/assembly/video_editor.py

      - name: 4. Upload
        uses: actions/upload-artifact@v4
        with:
          name: finished-youtube-short
          path: master_final_video.mp4
