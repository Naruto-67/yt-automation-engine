name: Test Master Video Assembly

on:
  workflow_dispatch:

jobs:
  render-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install FFmpeg, LibAss and Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libass-dev libfreetype6-dev fonts-liberation

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: 1. Generate Voice & Metadata
        run: python src/generators/audio_generator.py

      - name: 2. Debug - List Files
        run: ls -R

      - name: 3. Download Background
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python src/generators/video_fetcher.py

      - name: 4. Assemble & Burn Subtitles
        run: python src/assembly/video_editor.py

      - name: 5. Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: finished-youtube-short
          path: master_final_video.mp4
