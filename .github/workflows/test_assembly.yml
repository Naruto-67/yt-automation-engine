name: Test Master Video Assembly

on:
  workflow_dispatch:

jobs:
  render-video:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-liberation
          # Confirm font exists at the exact path our code uses
          ls -la /usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: 1. Generate Voice + Timings
        run: python src/generators/audio_generator.py

      - name: 2. Debug — verify timings
        run: |
          echo "=== Files in root ==="
          ls -la
          echo ""
          echo "=== First 3 caption chunks ==="
          python3 -c "
          import json
          chunks = json.load(open('test_audio_timings.json'))
          print(f'Total chunks: {len(chunks)}')
          for c in chunks[:3]:
              print(c)
          "

      - name: 3. Download Background Video
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python src/generators/video_fetcher.py

      - name: 4. Assemble with CapCut Captions
        run: python src/assembly/video_editor.py

      - name: 5. Verify output exists
        run: |
          ls -lh master_final_video.mp4
          echo "File exists and has size above. Done."

      - name: 6. Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: finished-youtube-short
          path: master_final_video.mp4
