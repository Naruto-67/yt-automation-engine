name: 01_Ghost_Daily_Production

on:
  schedule:
    - cron: '0 8 * * *' # 1:30 PM IST
  workflow_dispatch:

jobs:
  build_and_vault:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg espeak-ng

      - name: Initialize Cache Directories
        run: mkdir -p ~/.cache/huggingface ~/.cache/kokoro

      - name: Cache AI Models
        id: cache-models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-models-v3

      - name: Install PyTorch CPU (Turbo Boost)
        run: pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install Python Requirements & Preload Models
        run: |
          pip install -r requirements.txt
          pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.8.0/en_core_web_sm-3.8.0-py3-none-any.whl
          
          # Pre-fetch the models so faster-whisper doesn't freeze the Python execution
          pip install huggingface_hub
          echo "Downloading Whisper Base Model..."
          huggingface-cli download Systran/faster-whisper-base
          echo "Downloading Kokoro V1 Model..."
          huggingface-cli download hexgrad/Kokoro-82M || true

      - name: Run Production Heart
        env:
          PYTHONUNBUFFERED: "1"  # 🚨 MAGIC KEY: Forces logs to stream in real-time
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
          HF_HUB_DISABLE_SYMLINKS_WARNING: "1"
        run: python main.py

      - name: Sync and Commit Memory State
        run: |
          git config --global user.name "Ghost-Engine-Bot"
          git config --global user.email "bot@ghostengine.ai"
          git add memory/*.json assets/lessons_learned.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update API State & Memory [skip ci]"
            git pull --rebase origin main
            git push origin main
            echo "✅ Memory state synchronized."
          fi

      - name: Cleanup Binary Artifacts
        if: always()
        run: |
          rm -rf *.mp4 *.wav *.mp3 *.srt *.ass temp_*
          pip cache purge
