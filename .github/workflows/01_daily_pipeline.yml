name: 01_Ghost_Daily_Production

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ghost-engine-lock
  cancel-in-progress: false

jobs:
  build-and-vault:
    runs-on: ubuntu-24.04
    if: vars.GHOST_ENGINE_ENABLED != 'false'
    
    # GOD-TIER FIX: Required for modern GitHub repos, otherwise the DB commit fails with 403 Forbidden.
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 1

      - name: Install System Dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq ffmpeg fonts-liberation espeak-ng
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Run Ghost Engine
        run: python main.py
        env:
          PYTHONUNBUFFERED: 1
          GHOST_ENGINE_ENABLED: ${{ vars.GHOST_ENGINE_ENABLED }}
          TEST_MODE: false
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          HF_TOKEN:             ${{ secrets.HF_TOKEN }}
          CF_ACCOUNT_ID:        ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN:         ${{ secrets.CF_API_TOKEN }}
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
          GOOGLE_SHEETS_ID:     ${{ secrets.GOOGLE_SHEETS_ID }}

          YOUTUBE_CLIENT_ID_MAIN:       ${{ secrets.YOUTUBE_CLIENT_ID_MAIN }}
          YOUTUBE_CLIENT_SECRET_MAIN:   ${{ secrets.YOUTUBE_CLIENT_SECRET_MAIN }}
          YOUTUBE_REFRESH_TOKEN_MAIN:   ${{ secrets.YOUTUBE_REFRESH_TOKEN_MAIN }}
          DISCORD_WEBHOOK_MAIN:         ${{ secrets.DISCORD_WEBHOOK_MAIN }}

      - name: Commit State & Memory
        run: |
          git config --global user.name  "Ghost-Engine-Bot"
          git config --global user.email "bot@ghostengine.ai"
          
          git add memory/ghost_engine.db || true
          git add memory/quota_state.json || true
          git add memory/replied_comments_*.json || true
          git add memory/token_health.json || true
          git add config/channels.yaml || true
          git add assets/lessons_learned.json || true
          
          if ! git diff --staged --quiet; then
            git commit -m "Pipeline: Update state, quota & memory [skip ci]"
            
            for i in {1..5}; do
              git push && break || {
                echo "└ ⚠️ Git push conflict detected. Rebasing (Attempt $i/5)..."
                git pull --rebase -X theirs origin main
                sleep $(( i * 5 ))
              }
            done
          fi

      - name: Upload Video Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ghost-engine-shorts-${{ github.run_number }}
          path: final_*.mp4
          if-no-files-found: warn
          retention-days: 3

      - name: Cleanup Runner Disk
        if: always()
        run: |
          rm -rf *.mp4 *.wav *.mp3 *.srt *.ass temp_* concat_list.txt
          pip cache purge
