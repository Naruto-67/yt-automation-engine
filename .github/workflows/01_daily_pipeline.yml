name: 01_Ghost_Daily_Production

# ── SCHEDULE: 00:00 UTC daily ─────────────────────────────────────────────────
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ghost-engine-lock
  cancel-in-progress: false

jobs:
  build-and-vault:
    runs-on: ubuntu-24.04
    # Kill switch: disable instantly from GitHub → Actions → Variables
    if: vars.GHOST_ENGINE_ENABLED != 'false'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 1

      - name: Install System Dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -yq ffmpeg fonts-liberation espeak-ng
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Run Ghost Engine
        run: python main.py
        env:
          PYTHONUNBUFFERED: 1
          GHOST_ENGINE_ENABLED: ${{ vars.GHOST_ENGINE_ENABLED }}
          TEST_MODE: false

          # ── AI / Image API Keys ───────────────────────────────────────────
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          HF_TOKEN:             ${{ secrets.HF_TOKEN }}
          CF_ACCOUNT_ID:        ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN:         ${{ secrets.CF_API_TOKEN }}

          # ── Optional: Google Sheets logging ──────────────────────────────
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
          GOOGLE_SHEETS_ID:     ${{ secrets.GOOGLE_SHEETS_ID }}

          # ── CH_MAIN_01 (active channel) ───────────────────────────────────
          # Each channel uses its OWN GCP project → independent 10,000pt/day quota
          YOUTUBE_CLIENT_ID_MAIN:       ${{ secrets.YOUTUBE_CLIENT_ID_MAIN }}
          YOUTUBE_CLIENT_SECRET_MAIN:   ${{ secrets.YOUTUBE_CLIENT_SECRET_MAIN }}
          YOUTUBE_REFRESH_TOKEN_MAIN:   ${{ secrets.YOUTUBE_REFRESH_TOKEN_MAIN }}
          DISCORD_WEBHOOK_MAIN:         ${{ secrets.DISCORD_WEBHOOK_MAIN }}

          # ── CH_TECH_02 (placeholder — add when GCP project is created) ────
          # YOUTUBE_CLIENT_ID_TECH:     ${{ secrets.YOUTUBE_CLIENT_ID_TECH }}
          # YOUTUBE_CLIENT_SECRET_TECH: ${{ secrets.YOUTUBE_CLIENT_SECRET_TECH }}
          # YOUTUBE_REFRESH_TOKEN_TECH: ${{ secrets.YOUTUBE_REFRESH_TOKEN_TECH }}
          # DISCORD_WEBHOOK_TECH:       ${{ secrets.DISCORD_WEBHOOK_TECH }}

          # ── TO ADD A NEW CHANNEL: uncomment and rename the block above ────
          # YOUTUBE_CLIENT_ID_CH3:      ${{ secrets.YOUTUBE_CLIENT_ID_CH3 }}
          # YOUTUBE_CLIENT_SECRET_CH3:  ${{ secrets.YOUTUBE_CLIENT_SECRET_CH3 }}
          # YOUTUBE_REFRESH_TOKEN_CH3:  ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH3 }}
          # DISCORD_WEBHOOK_CH3:        ${{ secrets.DISCORD_WEBHOOK_CH3 }}

      - name: Commit State & Memory
        run: |
          git config --global user.name  "Ghost-Engine-Bot"
          git config --global user.email "bot@ghostengine.ai"
          # ── CRITICAL: commit DB for cross-workflow state persistence ──────
          git add memory/ghost_engine.db memory/quota_state.json memory/replied_comments.json || true
          git add assets/lessons_learned.json || true
          git add config/channels.yaml || true  # Identity sync may update this
          if ! git diff --staged --quiet; then
            git commit -m "Pipeline: Update state, quota & memory [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Upload Video Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ghost-engine-shorts-${{ github.run_number }}
          path: final_*.mp4
          if-no-files-found: warn
          retention-days: 3

      - name: Cleanup Runner Disk
        if: always()
        run: |
          rm -rf *.mp4 *.wav *.mp3 *.srt *.ass temp_* concat_list.txt
          pip cache purge
