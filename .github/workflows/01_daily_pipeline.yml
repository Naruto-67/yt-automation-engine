name: 01_Ghost_Daily_Production

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  build-and-vault:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies (FFmpeg & Kokoro Voice Engine)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-liberation espeak-ng

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python packages
        run: pip install -r requirements.txt

      - name: Run Master Orchestrator
        env:
          PYTHONUNBUFFERED: "1"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python main.py

      - name: Sync and Commit Memory State
        run: |
          git config --global user.name "Ghost-Engine-Bot"
          git config --global user.email "bot@ghostengine.ai"
          git add memory/*.json assets/lessons_learned.json
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update API State & Memory [skip ci]"
            git pull --rebase origin main
            git push origin main
            echo "✅ Memory state synchronized."
          fi

      - name: Upload Final Video Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: finished-youtube-shorts
          path: final_*.mp4
          if-no-files-found: warn
          compression-level: 6

      - name: Cleanup
        run: |
          rm -rf *.mp4 *.wav *.mp3 *.srt *.ass temp_*
