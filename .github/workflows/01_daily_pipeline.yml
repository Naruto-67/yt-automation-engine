# .github/workflows/01_daily_pipeline.yml
# ═══════════════════════════════════════════════════════════════════════════════
# FIX #8 — Kill switch was hardcoded to `true` in this workflow
#
# BUG: The `GHOST_ENGINE_ENABLED` env var was hardcoded as `true` in this
# workflow's `env:` block, overriding the repo variable set by 06_System_Control.
# So when an operator ran 06_System_Control → "disable", the other workflows
# (02-05) correctly stopped via their `if: vars.GHOST_ENGINE_ENABLED != 'false'`
# condition, but 01_daily_pipeline kept running and producing videos — because
# the hardcoded `true` was passed to main.py instead of the repo variable.
#
# FIX: Two changes:
#   1. Job-level `if:` condition added — matching 02-05 workflows exactly.
#      This stops the entire job before Python even starts.
#   2. `GHOST_ENGINE_ENABLED` env var now reads from `vars.GHOST_ENGINE_ENABLED`
#      so main.py receives the operator's intended value, not a hardcoded one.
# ═══════════════════════════════════════════════════════════════════════════════

name: 01_Ghost_Daily_Production

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: ghost-engine-lock
  cancel-in-progress: false

jobs:
  build-and-vault:
    runs-on: ubuntu-24.04

    # ── FIX #8: Respect the operator kill switch at the GHA job level ─────────
    # Previously missing from this workflow (unlike 02-05 which had it).
    # If GHOST_ENGINE_ENABLED is set to 'false' via 06_System_Control, this
    # entire job is skipped — Python never starts, no Kokoro model downloaded,
    # no API calls made, no videos produced.
    # The force_run input allows manual bypass for testing while system is paused.
    if: vars.GHOST_ENGINE_ENABLED != 'false' || github.event.inputs.force_run == 'true'
    # ─────────────────────────────────────────────────────────────────────────

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token:                   ${{ secrets.GITHUB_TOKEN }}
          ssh-strict:              true
          ssh-user:                git
          persist-credentials:     true
          clean:                   true
          sparse-checkout-cone-mode: true
          fetch-depth:             1
          fetch-tags:              false
          show-progress:           true
          lfs:                     false
          submodules:              false
          set-safe-directory:      true

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -yq ffmpeg fonts-liberation espeak-ng
        env:
          DEBIAN_FRONTEND: noninteractive

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version:     '3.11'
          check-latest:       false
          update-environment: true
          allow-prereleases:  false
          freethreaded:       false

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Run Ghost Engine
        run: python main.py
        env:
          PYTHONUNBUFFERED: 1
          # ── FIX #8: Read from repo variable, not hardcoded 'true' ─────────
          # This passes the operator's actual setting to main.py's kill switch
          # check at os.environ.get("GHOST_ENGINE_ENABLED", "true").
          GHOST_ENGINE_ENABLED: ${{ vars.GHOST_ENGINE_ENABLED }}
          # ──────────────────────────────────────────────────────────────────
          TEST_MODE:            false
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          HF_TOKEN:             ${{ secrets.HF_TOKEN }}
          CF_ACCOUNT_ID:        ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN:         ${{ secrets.CF_API_TOKEN }}
          GCP_CREDENTIALS_JSON: ${{ secrets.GCP_CREDENTIALS_JSON }}
          GOOGLE_SHEETS_ID:     ${{ secrets.GOOGLE_SHEETS_ID }}
          DISCORD_WEBHOOK_URL:  ${{ secrets.DISCORD_WEBHOOK_URL }}
          YOUTUBE_CLIENT_ID:    ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}

      - name: Update API State & Memory
        run: |
          git config --global user.name  "Ghost-Engine-Bot"
          git config --global user.email "bot@ghostengine.ai"
          git add memory/ assets/lessons_learned.json || true
          if ! git diff --staged --quiet; then
            git commit -m "Update API State & Memory [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name:              finished-youtube-shorts
          path:              final_*.mp4
          if-no-files-found: warn
          compression-level: 6
          retention-days:    3
          overwrite:         false
          include-hidden-files: false

      - name: Cleanup Space
        run: rm -rf *.mp4 *.wav *.mp3 *.srt *.ass temp_* && pip cache purge
