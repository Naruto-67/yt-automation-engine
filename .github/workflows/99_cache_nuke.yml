name: 99_Cache_Nuke_Cleanup

on:
  workflow_dispatch:

jobs:
  purge_cache:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Purge All Project Caches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔍 Checking for existing caches..."
          gh cache list --limit 100
          
          echo "🧹 Initializing System-Wide Cache Purge..."
          # The '|| true' ensures that even if no caches are found, the script doesn't error out.
          gh cache delete --all || echo "⚠️ No caches were found in the current context, or they are already being evicted."
          
          echo "✅ Cache Storage Reset Protocol Complete."
