name: Weekly Trending Researcher

on:
  schedule:
    - cron: '0 18 * * 0'
  workflow_dispatch:

jobs:
  scrape-trends:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install google-genai requests pytz

      - name: Create memory directory
        run: mkdir -p memory

      - name: Run Trend Researcher
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m scripts.dynamic_researcher

      - name: Commit and Push Changes
        run: |
          git config --global user.name "AI Trend Researcher"
          git config --global user.email "actions@github.com"
          
          # Check if the file actually exists before adding
          if [ -f memory/content_matrix.json ]; then
            git add memory/content_matrix.json
            git commit -m "🔍 AI Research: Refreshed content matrix with trending topics" || echo "No changes to commit"
            git push origin main
          else
            echo "❌ Error: memory/content_matrix.json not found. Script likely failed."
            exit 1
          fi
