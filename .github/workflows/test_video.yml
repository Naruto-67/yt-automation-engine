name: Test Video Fetcher

on:
  workflow_dispatch:

jobs:
  test-visuals:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Download Video
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: python src/generators/video_fetcher.py

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bot-video-test
          path: test_video.mp4
