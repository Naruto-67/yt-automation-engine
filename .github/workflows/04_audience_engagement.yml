# .github/workflows/04_audience_engagement.yml
# ═══════════════════════════════════════════════════════════════════════════════
# FIX #5 (SUPPORT) — Persist memory/replied_comments.json after each run
#
# reply_comments.py now writes memory/replied_comments.json to track which
# comment thread IDs have been replied to. This file must be committed back
# to the repo so the deduplication persists across ephemeral GHA runners.
#
# CHANGE: The git-add step now includes memory/replied_comments.json.
# Everything else is unchanged from the original workflow.
# ═══════════════════════════════════════════════════════════════════════════════

name: 04_Ghost_Audience_Engagement

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if kill switch is active'
        type: boolean
        default: false

concurrency:
  group: ghost-engine-lock
  cancel-in-progress: false

jobs:
  engage_fans:
    runs-on: ubuntu-latest
    if: vars.GHOST_ENGINE_ENABLED != 'false' || github.event.inputs.force_run == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: |
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - env:
          GHOST_ENGINE_ENABLED:  ${{ vars.GHOST_ENGINE_ENABLED }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          DISCORD_WEBHOOK_URL:   ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m scripts.reply_comments

      - run: |
          git config --global user.name  "Ghost-Engine-Bot"
          git config --global user.email "bot@ghostengine.ai"
          # ── FIX #5: Also commit replied_comments.json ─────────────────────
          git add memory/api_state.json memory/replied_comments.json || true
          # ──────────────────────────────────────────────────────────────────
          if ! git diff --staged --quiet; then
            git commit -m "Update Reply Quota & Deduplication Cache [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
