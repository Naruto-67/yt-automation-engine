name: 04_Ghost_Audience_Engagement

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  engage_fans:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Execute Safety-First Reply Bot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m scripts.reply_comments

      - name: Sync API Quotas
        run: |
          git config --global user.name "Ghost-Engine-Bot"
          git config --global user.email "bot@ghostengine.ai"
          git add memory/api_state.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update Reply Quota [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
