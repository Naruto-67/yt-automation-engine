name: 05_Ghost_Weekly_Research

on:
  schedule:
    - cron: '0 0 * * 0' # Sunday 5:30 AM IST
  workflow_dispatch: # This allows your manual trigger

jobs:
  scrape_trends:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install google-genai requests
          # Injecting root into path to prevent ModuleNotFoundError
          echo "PYTHONPATH=$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

      - name: Run Trend Researcher
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        # Corrected module-based execution
        run: python -m scripts.dynamic_researcher

      - name: Sync and Commit Matrix
        run: |
          git config --global user.name "Ghost-Engine-Bot"
          git config --global user.email "bot@ghostengine.ai"
          git add memory/content_matrix.json
          git pull --rebase origin main
          git commit -m "Lock New Content Matrix [skip ci]" || echo "No changes to commit"
          git push origin main
