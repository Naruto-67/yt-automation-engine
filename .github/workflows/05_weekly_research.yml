name: 05_Ghost_Weekly_Research
on:
  schedule:
    - cron: '0 20 * * 0' 
  workflow_dispatch:

concurrency:
  group: ghost-engine-lock
  cancel-in-progress: false

jobs:
  scrape_trends:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install -r requirements.txt
          echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV
      - env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python -m scripts.dynamic_researcher
      - run: |
          git config --global user.name "Ghost-Engine-Bot"
          git config --global user.email "bot@ghostengine.ai"
          git add memory/content_matrix.json memory/api_state.json
          if ! git diff --staged --quiet; then
            git commit -m "Lock New Content Matrix [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
