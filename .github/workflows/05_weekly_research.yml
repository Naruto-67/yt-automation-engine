name: 05_Ghost_Weekly_Research

on:
  schedule:
    - cron: '0 0 * * 0' # Sunday 5:30 AM IST
  workflow_dispatch:

jobs:
  scrape_trends:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install google-genai requests pytz
          # Clean PYTHONPATH injection
          echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      - name: Run Trend Researcher
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m scripts.dynamic_researcher

      - name: Sync and Commit Matrix
        run: |
          git config --global user.name "Ghost-Engine-Bot"
          git config --global user.email "bot@ghostengine.ai"
          
          # 1. Check if the file was created
          if [ -f memory/content_matrix.json ]; then
            git add memory/content_matrix.json
            
            # 2. Check if there are actual changes staged
            if git diff --staged --quiet; then
              echo "No changes detected in content_matrix.json. Skipping."
            else
              # 3. Commit locally first
              git commit -m "Lock New Content Matrix [skip ci]"
              
              # 4. Pull rebase to handle remote changes made during the run
              git pull --rebase origin main
              
              # 5. Push the unified history
              git push origin main
              echo "✅ Matrix synchronized successfully."
            fi
          else
            echo "⚠️ No content_matrix.json found. Research failed or returned empty."
          fi
