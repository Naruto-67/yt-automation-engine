name: 05_Ghost_Weekly_Research
on:
  schedule:
    - cron: '0 20 * * 0'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if kill switch is active'
        type: boolean
        default: false

concurrency:
  group: ghost-engine-lock
  cancel-in-progress: false

jobs:
  scrape_trends:
    runs-on: ubuntu-latest
    if: vars.GHOST_ENGINE_ENABLED != 'false' || github.event.inputs.force_run == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm
          echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV
      - env:
          GHOST_ENGINE_ENABLED: ${{ vars.GHOST_ENGINE_ENABLED }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python -m scripts.dynamic_researcher
      - run: |
          git config --global user.name "Ghost-Engine-Bot"
          git config --global user.email "bot@ghostengine.ai"
          git add memory/
          if ! git diff --staged --quiet; then
            git commit -m "Lock New Content Matrix & Archive [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
