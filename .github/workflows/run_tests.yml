# .github/workflows/run_tests.yml
name: Run Python Tests

on:
  workflow_dispatch: # This allows you to trigger it manually from the UI

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock google-genai requests pytz pyyaml
          # Assuming you might need some base packages from requirements.txt to import your modules
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Pytest
        env:
          TEST_MODE: "true"
        run: |
          python -m pytest tests/ -v
