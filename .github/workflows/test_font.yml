name: Test Font Download
on:
  workflow_dispatch:

jobs:
  test-font:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Requests
        run: pip install requests
      - name: Run Font Test
        run: python test_font.py
