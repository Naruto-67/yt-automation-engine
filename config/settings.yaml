# config/settings.yaml
# Ghost Engine V26.0.0 — Production & Compliance Standards
version: "26.0.0"

# ─── API LIMITS ───────────────────────────────────────────────────────────────
api_limits:
  gemini: 38        
  cloudflare: 90    
  huggingface: 45   
  youtube: 9200     
  groq_tpm: 6000    

# ─── GUARDIAN COSTS ───────────────────────────────────────────────────────────
guardian_costs:
  youtube_points: 1850   
  gemini_calls: 3        
  image_calls: 7         
  safe_mode_threshold: 0.85 

# ─── DIRECTORY STRUCTURE (V26) ────────────────────────────────────────────────
paths:
  assets: "assets"
  music_bank: "assets/music"       
  fonts: "assets/fonts"
  output: "output"
  temp: "temp"
  database: "memory/ghost_engine.db"
  test_database: "memory/ghost_engine_test.db"

# ─── AUDIO MIXING STANDARDS (V26) ─────────────────────────────────────────────
audio:
  voice_volume: 1.0                
  music_volume: 0.12               
  fade_duration: 2.0               
  sample_rate: 44100

# ─── TTS CALIBRATION ──────────────────────────────────────────────────────────
tts:
  base_wpm: 130
  kokoro_speed_multiplier: 1.1
  max_duration_seconds: 59 

# ─── VIDEO PRODUCTION ─────────────────────────────────────────────────────────
video:
  width: 1080
  height: 1920
  fps: 30
  max_duration: 59
  min_disk_gb: 2.5 

# ─── 2026 COMPLIANCE & WATERMARKING (V26) ─────────────────────────────────────
visuals:
  watermark:
    opacity: 0.35
    font_size: 45
    positions: ["top_right", "bottom_left", "top_left", "bottom_right"]

# ─── VAULT MANAGEMENT ─────────────────────────────────────────────────────────
vault:
  max_videos: 14
  publish_per_run: 2

# ─── VOICE ACTORS & FALLBACKS ─────────────────────────────────────────────────
voice_actors:
  kokoro: ["am_adam", "af_bella", "am_michael", "af_sarah"]
  groq: ["autumn", "diana", "hannah", "austin", "daniel", "troy"]
  kokoro_to_groq_map:
    am_adam: "daniel"
    af_bella: "diana"
    am_michael: "austin"
    af_sarah: "hannah"

# ─── GLOW COLOR PRESETS ───────────────────────────────────────────────────────
glow_color_presets:
  green: "&H0000D700"  
  cyan:  "&H00FFD700"  
  red:   "&H000015FF"  
  blue:  "&H00FF8040"  

# ─── STORAGE & INTELLIGENCE ───────────────────────────────────────────────────
storage:
  db_prune_after_days: 30
  error_log_max_mb: 1
intelligence:
  max_rules: 5
  rule_decay_days: 30

# ─── FALLBACK CHAINS ──────────────────────────────────────────────────────────
gemini_model_fallback_chain:
  - "gemini-2.0-flash"
  - "gemini-2.0-flash-lite"
  - "gemini-1.5-flash-8b"
  - "gemini-1.5-flash"
  - "gemini-1.0-pro"

groq_model_fallback_chain:
  - "llama-3.3-70b-versatile"
  - "llama-3.1-70b-versatile"
  - "llama3-70b-8192"
  - "mixtral-8x7b-32768"

# ─── SYSTEM DEFAULTS ──────────────────────────────────────────────────────────
test_mode: true 
max_retries: 3
