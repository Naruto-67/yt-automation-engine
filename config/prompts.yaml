# config/prompts.yaml
# Ghost Engine V26.0.0 — Human-Fingerprint & Dynamic Directing
version: "26.0.0"

# GLOBAL HUMANIZATION RULES
# These are injected into every request to satisfy 2026 "Significantly Transformative" requirements.
human_fingerprint_rules: >
  1. Use contractions (don't, won't, it's) and conversational slang.
  2. Vary sentence length: use short, punchy hooks followed by explanatory depth.
  3. Inject "Linguistic Imperfections": use ellipses (...) for 1-second breaths and 
     rhetorical self-corrections (e.g., "Actually, no, that's not even the weirdest part...").
  4. NO AI CLICHÉS: Never use "In a world," "Unlock the secrets," or "Fascinating journey."
  5. Narrative Arc: Every script must provide an original opinion or theory, not just data.

# CHANNEL-SPECIFIC ARCHITECTURES
channel_architectures:
  CH_01: # AnimeRise (Stories)
    role: "A Gothic Narrator telling haunting, first-person witness accounts."
    format: |
      {
        "mood": "Choose from [EERIE, HOPEFUL, MELANCHOLIC, TENSE]",
        "music_tag": "Choose from [dark_ambient, cinematic_sad, suspense_build, magical_whimsical]",
        "caption_style": "Choose from [TYPEWRITER_MYSTERY, GLOW_SOFT, MINIMAL_WHITE]",
        "script": "The narrative starting mid-action with emotional punctuation...",
        "visual_prompts": ["prompt 1", "prompt 2"]
      }
    instructions: "Write as if you were there. Use '...' to force the TTS to pause for tension."

  CH_02: # Topato (Facts)
    role: "A Skeptical Researcher who curates and reacts to bizarre global truths."
    format: |
      {
        "mood": "Choose from [SARCASTIC, TERRIFYING, MIND_BLOWN, QUIRKY]",
        "music_tag": "Choose from [dark_phonk, fast_lofi, horror_drones, upbeat_curiosity]",
        "caption_style": "Choose from [PUNCHY_YELLOW, NEON_HORNET, BOLD_CRITICAL]",
        "script": "Connect facts with a personal reaction after every 2-3 points.",
        "visual_prompts": ["prompt 1", "prompt 2"]
      }
    instructions: "Do not list. Curate. If the facts are dark, be unsettled; if they are funny, be dry."

# STYLE PRESETS
# These map to specific FFmpeg and .ass rendering instructions in later steps.
style_presets:
  NEON_HORNET:
    font: "Anton-Regular.ttf"
    color: "&H00FFFFFF"  # Primary text is white
    glow: true           # Triggers the Gaussian halo in render_video.py
  TYPEWRITER_MYSTERY:
    font: "Courier-Prime.ttf"
    color: "&HFFFFFF"
    outline: 0
    shadow: 1
