# config/channels.yaml — Ghost Engine Multi-Channel Configuration
#
# ══════════════════════════════════════════════════════════════════════════════
# HOW TO ADD A NEW CHANNEL (zero code changes needed after initial setup)
# ══════════════════════════════════════════════════════════════════════════════
#
# 1. CREATE A SEPARATE GCP PROJECT for the new channel
#    → Each channel needs its OWN GCP project for independent 10,000pt/day quotas
#
# 2. ENABLE THE YOUTUBE DATA API V3 in that GCP project
#
# 3. CREATE OAUTH 2.0 CREDENTIALS (Web Application type)
#    → Add Authorized Redirect URI: https://developers.google.com/oauthplayground
#
# 4. GENERATE REFRESH TOKEN via OAuth Playground
#
# 5. ADD GITHUB SECRETS (Settings → Secrets → Actions):
#    → YOUTUBE_CLIENT_ID_CHX
#    → YOUTUBE_CLIENT_SECRET_CHX
#    → YOUTUBE_REFRESH_TOKEN_CHX
#    → DISCORD_WEBHOOK_CHX
# ══════════════════════════════════════════════════════════════════════════════

channels:
  - id: "CH_01"
    name: "GhostEngine_Main"
    # Baseline niche — system will evolve beyond this using research & analysis
    niche: "Faceless AI Animation, 3D/Pixar-Style Moral Storytelling"
    target_audience: "US"
    # Maps to the GitHub Secrets for Channel 1
    youtube_client_id_env: "YOUTUBE_CLIENT_ID_CH1"
    youtube_client_secret_env: "YOUTUBE_CLIENT_SECRET_CH1"
    youtube_refresh_token_env: "YOUTUBE_REFRESH_TOKEN_CH1"
    discord_webhook_env: "DISCORD_WEBHOOK_CH1"
    active: true

  - id: "CH_02"
    name: "GhostEngine_Second"
    # Update this to whatever baseline niche you want for the second channel
    niche: "facts, AI, Automation, Futuristic Tech,storytelling, high-concept explainers, and faceless documentaries"
    target_audience: "US"
    # Maps to the GitHub Secrets for Channel 2
    youtube_client_id_env: "YOUTUBE_CLIENT_ID_CH2"
    youtube_client_secret_env: "YOUTUBE_CLIENT_SECRET_CH2"
    youtube_refresh_token_env: "YOUTUBE_REFRESH_TOKEN_CH2"
    discord_webhook_env: "DISCORD_WEBHOOK_CH2"
    active: true
