# config/channels.yaml
version: "6.0.0"

channels:
  - id: "CH_MAIN_01"
    name: "GhostEngine_Main"
    niche: "Faceless AI Animation, 3D/Pixar-Style Moral Storytelling"
    target_audience: "US"
    youtube_refresh_token_env: "YOUTUBE_REFRESH_TOKEN_CH1"
    active: true
    # 🎨 The specific AI Hallucination Lenses for Channel 1
    creative_lenses:
      - "The secret, unseen lives of everyday inanimate objects"
      - "Unlikely and dangerous animal friendships in harsh environments"
      - "Miniature, hidden civilizations living right beneath human feet"
      - "The emotional journey of a discarded, obsolete piece of technology"
      - "Magical realism intersecting with a mundane, normal human life"
      - "The personification of abstract concepts, elements, or emotions"
      - "A massive, epic adventure undertaken by the smallest possible creature"
      - "A misunderstanding between a gentle monster and a terrified human"

  - id: "CH_TECH_02"
    name: "GhostEngine_Tech"
    niche: "Facts (fun, horror, tech), AI, Automation, Futuristic Tech, high-concept explainers, faceless documentaries"
    target_audience: "US"
    youtube_refresh_token_env: "YOUTUBE_REFRESH_TOKEN_CH2"
    active: true
    # 🎨 The specific AI Hallucination Lenses for Channel 2
    creative_lenses:
      - "Glitches in the Matrix and Simulation Theory proofs"
      - "Terrifying, unintended consequences of future AI automation"
      - "Historical technological anomalies and unexplained artifacts"
      - "Mind-bending physics paradoxes explained simply"
      - "Deep sea terrors and biologically bizarre evolution facts"
      - "Secret societies, hidden architecture, and classified projects"
      - "Dystopian cyberpunk concepts that are becoming reality today"
      - "Creepy space facts and the dark forest theory of the universe"
