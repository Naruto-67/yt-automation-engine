# config/channels.yaml
version: "26.0.0"

channels:
  - id: "CH_01"
    name: "AnimeRise"
    niche: "3D/Pixar-Style Moral Storytelling"
    target_audience: "US"
    category_id: "1"          # Film & Animation — higher RPM than People & Blogs (22)
    language: "en"             # English TTS — required for US ad targeting
    content_type: "fictional"  # Signals script_gen to use storytelling rules, not fact rules
    youtube_client_id_env: "YOUTUBE_CLIENT_ID_CH1"
    youtube_client_secret_env: "YOUTUBE_CLIENT_SECRET_CH1"
    youtube_refresh_token_env: "YOUTUBE_REFRESH_TOKEN_CH1"
    discord_webhook_env: "DISCORD_WEBHOOK_CH1"
    active: true
    creative_lenses:
      - "The secret, unseen lives of everyday inanimate objects"
      - "Unlikely and dangerous animal friendships in harsh environments"
      - "Miniature, hidden civilizations living right beneath human feet"
      - "The emotional journey of a discarded, obsolete piece of technology"
      - "Magical realism intersecting with a mundane, normal human life"
      - "The personification of abstract concepts, elements, or emotions"
      - "A massive, epic adventure undertaken by the smallest possible creature"
      - "A misunderstanding between a gentle monster and a terrified human"

  - id: "CH_02"
    name: "Topato"
    niche: "trending facts, interesting facts, seasonal facts, educational facts, mind-blowing facts, random facts"
    target_audience: "US"
    category_id: "27"          # Education — highest-RPM tier for fact/educational content
    language: "en"              # English TTS — required for US ad targeting
    content_type: "factual"    # Signals script_gen to enforce real facts and specifics
    youtube_client_id_env: "YOUTUBE_CLIENT_ID_CH2"
    youtube_client_secret_env: "YOUTUBE_CLIENT_SECRET_CH2"
    youtube_refresh_token_env: "YOUTUBE_REFRESH_TOKEN_CH2"
    discord_webhook_env: "DISCORD_WEBHOOK_CH2"
    active: true
    creative_lenses:
      # — Original lenses (preserved exactly) —
      - "Counter-intuitive facts that contradict common beliefs"
      - "Largest, smallest, fastest, oldest things in existence"
      - "Bizarre historical events that sound fictional but are real"
      - "Hidden systems behind everyday life"
      - "Extremely strange biological adaptations"
      - "Facts about things happening right now on Earth"
      - "Mind-blowing space and cosmic phenomena"
      - "Future technologies that already exist in early form"
      - "Crazy probabilities and coincidences"
      - "Deep dives into ordinary objects revealing shocking facts"
      - "Phenomena that seem impossible but are scientifically proven"
      - "Unusual natural disasters or environmental phenomena"
      # — New lenses: expanding spectrum from fun to dark to psychological —
      - "Psychological facts about how humans think, decide, and fool themselves"
      - "Shocking food science facts hiding inside everyday ingredients"
      - "Strange and surprising human body capabilities and hard limits"
      - "Real unsolved historical crimes and mysteries still open today"
      - "Technology secrets hidden inside products everyone owns and uses"
      - "World records so extreme and specific they seem invented"
      - "Strange laws still officially on the books in countries worldwide"
      - "Survival science: what actually kills you in extreme environments"
      - "Optical physics and light phenomena most people never learn about"
      - "Economics and money facts that permanently change how you see prices"
